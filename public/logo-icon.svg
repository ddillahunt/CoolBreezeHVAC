<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Rounded shield -->
  <rect x="2" y="2" width="60" height="60" rx="16" fill="#1E40AF"/>
  <rect x="4" y="4" width="56" height="56" rx="14" fill="none" stroke="#38BDF8" stroke-width="0.5" opacity="0.3"/>

  <!-- Snowflake (refined, symmetrical) -->
  <g transform="translate(28, 32)" stroke="#38BDF8" stroke-linecap="round">
    <!-- Main spokes -->
    <line x1="0" y1="-15" x2="0" y2="15" stroke-width="2.2"/>
    <line x1="-13" y1="-7.5" x2="13" y2="7.5" stroke-width="2.2"/>
    <line x1="-13" y1="7.5" x2="13" y2="-7.5" stroke-width="2.2"/>
    <!-- Top branches -->
    <line x1="0" y1="-15" x2="-3.5" y2="-10.5" stroke-width="1.8"/>
    <line x1="0" y1="-15" x2="3.5" y2="-10.5" stroke-width="1.8"/>
    <!-- Bottom branches -->
    <line x1="0" y1="15" x2="-3.5" y2="10.5" stroke-width="1.8"/>
    <line x1="0" y1="15" x2="3.5" y2="10.5" stroke-width="1.8"/>
    <!-- Upper-right branches -->
    <line x1="13" y1="-7.5" x2="8.5" y2="-3" stroke-width="1.8"/>
    <line x1="13" y1="-7.5" x2="10" y2="-10.5" stroke-width="1.8"/>
    <!-- Lower-left branches -->
    <line x1="-13" y1="7.5" x2="-8.5" y2="3" stroke-width="1.8"/>
    <line x1="-13" y1="7.5" x2="-10" y2="10.5" stroke-width="1.8"/>
    <!-- Upper-left branches -->
    <line x1="-13" y1="-7.5" x2="-10" y2="-10.5" stroke-width="1.8"/>
    <line x1="-13" y1="-7.5" x2="-8.5" y2="-3" stroke-width="1.8"/>
    <!-- Lower-right branches -->
    <line x1="13" y1="7.5" x2="10" y2="10.5" stroke-width="1.8"/>
    <line x1="13" y1="7.5" x2="8.5" y2="3" stroke-width="1.8"/>
    <!-- Center diamond -->
    <circle cx="0" cy="0" r="2.5" fill="#38BDF8" stroke="none"/>
  </g>

  <!-- Breeze curves (flowing, organic) -->
  <g fill="none" stroke="#F97316" stroke-linecap="round">
    <path d="M40 20 C45 20, 48 17, 53 17" stroke-width="2" opacity="0.9"/>
    <path d="M42 28 C47 28, 50 25, 56 25" stroke-width="1.6" opacity="0.7"/>
    <path d="M40 44 C45 44, 48 47, 53 47" stroke-width="2" opacity="0.9"/>
    <path d="M42 36 C47 36, 50 39, 56 39" stroke-width="1.6" opacity="0.7"/>
  </g>
</svg>
